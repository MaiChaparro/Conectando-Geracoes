<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="../assets/imglogoM.png" type="image/x-icon">
  <link rel="stylesheet" href="../css/cadastro.css">
  <title>Conectando Gerações - Crie sua conta</title>
</head>
<body>
<div class="container">
  <aside class="sidebar">
    <div class="sidebar-photo"></div>
     <div class="sidebar-content">
      <h2>Faça parte de uma comunidade que <br><span>transforma vidas.</span></h2>
     </div>

     <ul class="beneficios-list">
      <li class="beneficios-item">
        <img src="../assets/Star.png" alt="Estrela">
        <p>Tenha <strong>certificados</strong> e acompanhe seu impacto.</p>
      </li>
      <li class="beneficios-item">
        <img src="../assets/prancheta.png" alt="Prancheta">
        <p>Encontre <strong>missões</strong> que combinam com você.</p>
      </li>
      <li class="beneficios-item">
        <img src="../assets/pessoas.png" alt="Usuário">
        <p>Envie <strong>solicitações de ajuda</strong> quando quiser.</p>
      </li>
     </ul>
  </aside>

  <main class="main-content">
    <header class="header-forms">
      <img src="../assets/Logo árvore.png" alt="Logo Conectando Gerações" class="logo">
      <img src="../assets/Logo escrita.png" alt="Logo Conectando Gerações" class="logo">
      <div class="title-area">
        <h1>Crie <span>sua conta</span></h1>
        <p>Junte-se a nós e faça a diferença!</p>
      </div>
    </header>

    <form  action="#" method="POST">
      <div class="form-grid">

        <div class="input-group coln-nome">
          <label>Nome completo</label>
          <div class="input-wrapper has-icon-left">
            <img src="../assets/pessoas.png" alt="" class="icon-left">
            <input type="text" placeholder="Digite seu nome completo">
          </div class="input-group coln-email">
           <label>E-mail</label>
           <div class="input-wrapper has-icon-left">
            <img src="../assets/letter.png" alt="">
            <input type="email" placeholder="Digite seu e-mail">
           </div>
        </div>

        <div class="input-group coln-tel">
          <label>Telefone/ Celular</label>
          <div class="input-wrapper">
             <input type="text" placeholder="Ex: (11) 9 9999-9999">
          </div>
        </div>
        <div class="input-group coln-cpf">
          <label>CPF</label>
          <div class="input-wrapper">
             <input type="text" placeholder="Ex: 000.000.000-00">
          </div>
        </div>
        <div class="input-group coln-data">
          <label>Data de Nascimento</label>
          <div class="input-wrapper">
            <input type="text" placeholder="Ex: 00/00/0000">
          </div>
        </div>
        <div class="input-group coln-end">
          <label>Endereço</label>
          <div class="input-wrapper">
            <input type="text" placeholder="Ex: Rua Conectando Gerações">
          </div>
        </div>
        <div class="input-group coln-bairro">
            <label>Bairro</label>
             <div class="input-wrapper">
              <input type="text" placeholder="Ex: Jardim Gerações">
        </div>
      </div>
      <div class="input-group col-tel">
        <label>Telefone/Celular</label>
        <div class="input-wrapper">
          <input type="text" placeholder="Ex: (11) 9 9999-9999">
         </div>
      </div>

      <div>
        
      </div>
    </form>

  </main>  
  </div>
</body>
</html>
