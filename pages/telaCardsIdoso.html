<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../css/telaCardsIdoso.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Idoso</title>
</head>
<body>
  <header class="header">
      <div class="header-container">
        <div>
          <a href="../pages/telaInicialIdoso.html"><img class="logo" src="../assets/img/Logo.png" alt="logo"/></a>
        </div>

        <div class="perfil-container">
          <img src="../assets/img/fotoIdosa.jpg" alt="foto de perfil" />
          <div>
            <h4>Nome</h4>
            <p>Idade</p>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section>
        <div class="segurarMic">
          <div class="container-mic">
            <div class="microfone">
              <img src="../assets/icons/iconMic2.svg" alt="microfone">

              <div>
                <p>Clique e fale o que você precisa</p>
              </div>
            </div>
          </div>
        </div>

        <div class="segurarSolicitacao">
          <div class="card-descricao">
            <div class="cardTec">
              <img src="../assets/icons/iconTech.svg" alt="card Tecnologia">
              <h5>Tecnologia</h5>
              <p>Celular, aplicativos, internet</p>
            </div>

            <div class="descricao">
              <h4>Trocar Solicitação</h4>

              <div class="caixa">
                
                <input type="text" placeholder="Descreva o que você precisa">
              </div>
            </div>
          </div>
        </div>
      </section>

      <section>

        <div class="segurarDados">
          <div class="informacoes-container">
            <div class="informacoes">
              <div class="segurarInfo">
                <div class="label">
                  <label for="nome">Nome completo:</label>
                  <label for="idade">Idade:</label>
                  <label for="dataHora">Data e Hora:</label>
                  <label for="endereço">Localização:</label>
                </div>

                <div class="inputs">
                  <input id="nome" type="text" placeholder="Nome completo">
                  <input id="idade" type="number" placeholder="Idade">
                  <div>
                    <input id="dataHora" type="date">
                    <input id="dataHora" type="time">
                  </div>
                  <input id="endereço" type="text" placeholder="Endereço">
                  <div>
                    <input id="bairro" type="text" placeholder="Bairro">
                    <input id="cep" type="number" placeholder="CEP">
                  </div>
                  <div>
                    <input id="numero" type="number" placeholder="Número">
                    <input id="complemento" type="text" placeholder="Complemento">
                  </div>
                </div>
              </div>
            </div>

            <div class="botoes"><!-- criar um pop up de certeza antes de enviar ou cancelar -->
              <div><button id="enviar">Enviar</button></div>
              <div><a href="../pages/telaInicialIdoso.html"><button id="cancelar">Cancelar solicitação</button></a></div> 
            </div>
          </div>
        </div>
      </section>

      <footer>
        <div class="segurarQuadroAzul">
        <div class="quadroAzulAjuda">
          <a href="../pages/telaSuporteIdoso.html">

            <div class="ajuda-container">
              <div class="fone">
                <img src="../assets/icons/iconFones.svg" alt="fones">
              </div>

              <div class="escritaAjuda">
                <h3>Precisa de ajuda urgente?</h3>
                <p>Fale com nossa equipe de apoio</p>
              </div>
            </div>
          </a>
        </div>
      </div>
      </footer>
        



    </main>
</body>
</html>
