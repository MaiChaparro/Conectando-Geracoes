<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="../assets/img/LogoOficial.png" type="image/x-icon">
<link rel="stylesheet" href="../css/login.css">
  <title>Login - Conectando Gerações</title>
</head>
<body>
 <div class="main-container">
  <main class="form-section">
    <div class="logo-box">
      <a href="../index.html">
      <img src="../assets/img/Logo árvore.png" alt="Conectando Gerações Logo">
      <img src="../assets/img/Logo escrita.png" alt="Conectando Gerações Logo">
    </a>

    </div>
    <div class="text-welcome">
      <h1>Bem-vindo(a) <span class="green-text">de volta!</span></h1>
      <p>Faça login para continuar fazendo a diferença.</p>
    </div>
    <form onsubmit="event.preventDefault();">
      <div class="input-group">
        <label for="email-cpf">E-mail ou CPF</label>
        <div class="input-wrapper">
          <img src="../assets/icons/iconEmail.svg" alt="">
          <input type="text" id="email-cpf" placeholder="Digite seu e-mail ou CPF">
        </div>
      </div>
      <div class="input-group">
        <label for="password">Senha</label>
        <div class="input-wrapper">
          <img src="../assets/icons/iconcadeado.svg" alt="" class="input-icon-left">
          <input type="password" id="password" placeholder="Digite sua senha">
          <img src="../assets/icons/iconOlho.svg" alt="Mostrar Senha" class="input-icon-right">
        </div>
      </div>

      <div class="radio-container">
        <label class="radio-item">
        <input type="radio" name="perfil" value="voluntario"><span>Voluntário</span></label>
            <label class="radio-item">
            <input type="radio" name="perfil" value="beneficiario"><span>Beneficiário</span></label>
      </div>

      <div class="forgot-password-box">
        <a href="#">Esqueci minha senha</a>
      </div>
      <button type="submit"class="btn-submit">Entrar</button> 
    </form>

    <div class="divider">Ou</div> <!--aquele neogocio que separa o de baixo eo de cima-->
    <button class="btn-google">
      <img src="../assets/img/GoogleG.png" alt="Google Logo">
      Entrar com o Google
    </button>

    <p class="signup-text">Ainda não tem uma conta? <a href="./cadastro.html">Cadastre-se</a></p>
  </main>

  <section class="info-section">
    <div class="info-item">
      <img src="../assets/icons/iconCoracao.svg" alt="ícone Coração verde">
      <p>Pequenas ações podem transformar <span class="icons-highlight">histórias.</span></p>
    </div>
    <hr class="info-divider">
    <div class="info-item">
      <img src="..//assets/icons/iconePessoasVerde.svg" alt="">
      <p>Junte-se a centenas de voluntários e <span class="icons-highlight">impacte vidas!</span></p>
    </div>
    <hr class="info-divider">
    <div class="info-item">
       <img src="../assets/icons/iconEscudo.svg" alt="">
      <p>Ambiente <span class="icons-highlight">seguro</span> e <span class="icons-highlight">confiável</span> para todos os voluntários.</p>
    </div>
  </section>
  
  <section class="image-section">
    <img src="../assets/img/fotofamilia.png" alt="">
            </section>
 </div>
</body>
</html>
